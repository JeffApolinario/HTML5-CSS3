<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Média de Notas</title>

    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        thead{
            background-color: gray;
            color: white;
        }

       .cabecalhos {
        background-color: gray;
        color: white;
       }
    </style>
</head>
<body>
    <table>
        
            <thead>
                <tr>
                    <th rowspan="2" scope="col">Área</th>
                    <th rowspan="2" scope="col">Disciplinas</th>
                    <th colspan="2" scope="colgroup">Notas</th>
                    <th rowspan="2" scope="col">Média</th>
                </tr>

                <tr>
                        <td scope="col">Nota 01</td>
                        <td scope="col">Nota 02</td>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <th rowspan="4" scope="rowgroup">Exatas</th>
                    <td scope="row">Matemática</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>

                <tr>
                    <td scope="row">Física</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>

                <tr>
                    <td scope="row">Química</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>       
                
                <tr>
                    <td scope="row">Biologia</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>
            
                <tr class="cabecalhos">
                    <th colspan="4" scope="row">Média de Exatas</th>
                    <td scope="row">0.0</td>
                </tr>

                <tr>
                    <th rowspan="2" scope="rowgroup"> Humanos</th>
                    <td scope="row">História</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>

                <tr>
                    <td scope="row">Geográfia</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                    <td scope="row">0.0</td>
                </tr>

                <tr class="cabecalhos">
                    <th colspan="4" scope="row">Média de Humanas</th>
                    <td scope="row">0.0</td>
                </tr>
            </tbody>
    </table>
</body>
</html>
