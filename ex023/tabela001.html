<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif ;
        }

        table {
            width: 400px;
            border-collapse: collapse; /* unifica as bordas de uma tabela HTML*/
            border: 2px solid red;
        }

        td {
            border: 1px solid black;
        }

        tr.linha {
            background-color: gray;
        }

        td.dado {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <table > <!-- Irá determinar a minha tabela -->
        <tr> <!-- Primeira linha-->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>

        <tr class="linha"> <!-- Segunda linha-->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>

        <tr> <!-- Três linha-->
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>

        <tr> <!-- Quarta linha-->
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
