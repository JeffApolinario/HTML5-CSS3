<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iFrame</title>
    <style> 
        iframe { /* Uma CSS sempre será soberana em relação às estiliações inline, ou seja, estilizações feitas na linha do elemento*/
            width: 400px;
            height: 400px;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>

        <!-- Por padrão, o tamanho de um iFrame é 300x150 (300 de largura e 150 de altura)-->
    <p>
        Acessando o site do 

        <iframe src="https://www.cursoemvideo.com/" frameborder="0" height="400" scrolling="auto"> <!-- O frameborder retira a borda. Ao inserir um link, é possível você criar uma nova instância do site mencionado, isto é, criar uma janela do site mencionado dentro do seu site. Mas, vale ressaltar que, há sites que possuem proteções contra iframe.-->

        <a href="https://www.cursoemvideo.com/" target="_blank">Curso em Vídeo</a> <!-- Há dispositivos que não têm compatibilidade com o iFrame, então, para sanar essa questão, se não for compativel com iFrame, ele irá retornar o link do Curso em Vídeo-->

        </iframe>

        para aprender a programar
    </p>

        <p>
            O repositório do Guabanara
            
            <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="400" width="400">
                no <a href="https://github.com/gustavoguanabara" target="_blank">GitHub</a>
            </iframe>
                    também é uma ótima fonte de estudo.
        </p>
</body>
</html>
