<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
    <p>
        <label for="inome">Nome</label>
        <input type="text" name="nome" id="inome" required maxlength="30" placeholder="Nome Completo" autocomplete="name">
    </p>

    <p>
        <label for="imedia">Média</label>
        <input type="number" name="media" id="imedia" min="0" max="10" placeholder="0 a 10" step="0.1" value="5"> <!-- Só aceitará a inserção de número (Step muda de 0,5 em 0,5), min utilizado para determinar um número minimo, enquanto max é utilizado para determinar um número máximo. O value retira o placeholder, mas já traz a nota de 5 automaticamente-->
    </p>

    <p>
        <label for="imes">Período Letivo</label>
        <input type="month" name="mes" id="imes" value="2026-05">
    </p>

    <p>
        <label for="idia">Dia da Prova</label>
        <input type="date" name="dia" id="idia" value="2026-05-06">
    </p>

    <p>
        <label for="ihora"></label>
        <input type="time" name="hora" id="ihora" value="21:02">
    </p>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">

    </form>
</body>
</html>
