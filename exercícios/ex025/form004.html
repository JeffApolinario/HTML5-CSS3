<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>

    <form action="cadastro.php" method="get" autocomplete="on">

        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="inome">Nome:</label>
                <input type="text" name="nome" id="inome" autocomplete="name" required>
            </p>
            <p>
                <label for="iemail">E-mail:</label>
                <input type="email" name="E-mail" id="iemail" autocomplete="email" required>
            </p>
            <p>
                <label for="itelefone">Telefone:</label> <!-- Estudar RegEx (Expressões Regulares)-->
                <input type="tel" name="Telefone" id="itelefone" autocomplete="tel" pattern="^(\d{2})[0-9]{4, 5}-[0-9]{4}$" placeholder="(XX) XXXX-XXXX"> <!--Pattern utilizado para criar um padrão de preenchimento-->
            </p>
        </fieldset>

        <input type="submit" value="Enviar" >
        <input type="reset" value="Limpar"> 
    </form>
</body>
</html>
