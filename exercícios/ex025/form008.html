<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outputs em Formulário HTML</title>
</head>
<body>
    
    <form action="cadastro.php" method="POST" autocomplete="on">

        <p>
            <label for="in1">Número: 1</label>
            <input type="number" name="n1" id="in1" min="0"  max="50" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)"> <!--O Oninput serve para definir o que será feito com a entrada inserida pelo usuário. No caso, ele está solicitando que o número 1 seja somado ao número dois-->
        </p>

        <p>
            <label for="in2">Número 2: </label>
            <input type="number" name="n2" id="in2" min="0" max="50" required oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
        </p>

        <p>
            <label for="isoma">Soma: </label>
            <output name="soma" id="isoma"> <!-- O Output serve para mostrar resultados na tela para o usuário. Vale lembrar que o mesmo não poderá ser editado pelo usuário-->
                0
            </output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>

</body>
</html>
