<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.cotainer {
            background-color: lightblue;
         
            display: flex; 
            flex-flow: row nowrap;
            /* flex-direction: row;
            flex-wrap: nowrap; irá reduzir o conteúdo dentro do container de acordo com o tamanho do conteúdo, sem deslocá-lo para cima ou para baixo

            flex-wrap: wrap; Deslocará o último elemento dentro do container para baixo, no sentido do Cross-Axis
            
            Flex-wrap: wrap-reverse; /* Deslocará o último elemento dentro do container para baixo, no sentido oposto ao Cross-Axis*/
    
        }
        div.item {
            border: 1px solid black;
            flex:auto; 
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Exemplo de Bloco A</div>
        <div class="item">Exemplo de Bloco B</div>
        <div class="item">Exemplo de Bloco C</div>
        <div class="item">Exemplo de Bloco D</div>
        <div class="item">Exemplo de Bloco E</div>
        <div class="item">Exemplo de Bloco F</div>
        <div class="item">Exemplo de Bloco G
        </div>
    </div>
</body>
</html>
